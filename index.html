<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Erzurum Otobüs Takip</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f1f5f9;--bg2:#fff;--bd:#e2e8f0;--tx:#1e293b;--tx2:#64748b;--tx3:#94a3b8;--ac:#3b82f6;
}
[data-theme="dark"]{
  --bg:#0f172a;--bg2:#1e293b;--bd:#334155;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;--ac:#60a5fa;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 14px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:1000;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hlogo{font-size:20px}.htitle{font-size:14px;font-weight:700}.hsub{font-size:11px;color:var(--tx3)}
.hlive{margin-left:auto;font-size:11px;color:var(--tx2);background:var(--bg);border:1px solid var(--bd);padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.ldot{width:7px;height:7px;border-radius:50%;background:#94a3b8;transition:background .3s}
.ldot.on{background:#22c55e;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.hbtn{width:32px;height:32px;border:1px solid var(--bd);background:var(--bg);border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--tx2);flex-shrink:0}
.hbtn:hover{background:var(--bd)}
.main{display:flex;flex:1;overflow:hidden}
#sb{width:270px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sbtop{padding:10px 11px;border-bottom:1px solid var(--bd)}
.sw{position:relative}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--tx3)}
.sw input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--bd);border-radius:8px;font-size:12px;background:var(--bg);color:var(--tx);outline:none}
.sw input:focus{border-color:var(--ac)}
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.pill{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.ll{flex:1;overflow-y:auto;padding:2px 0}
.ll::-webkit-scrollbar{width:3px}
.ll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.li{display:flex;align-items:center;gap:9px;padding:7px 11px;cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.li:hover{background:var(--bg)}
.li.on{background:var(--ac)11;border-left-color:var(--ac)}
.lb{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.linfo .ln{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:168px}
.linfo .la{font-size:10px;color:var(--tx3)}
.sbar{padding:5px 11px;background:var(--bg);border-top:1px solid var(--bd);display:flex;gap:12px;font-size:10px;color:var(--tx2)}
#map{flex:1}
#panel{position:absolute;right:0;top:50px;bottom:0;width:292px;background:var(--bg2);border-left:1px solid var(--bd);box-shadow:-3px 0 16px rgba(0,0,0,.07);z-index:900;display:none;flex-direction:column}
#panel.open{display:flex}
.ph{padding:12px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:9px}
.pi{width:34px;height:34px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ptitle{font-size:12px;font-weight:700;line-height:1.4;flex:1}
.psub{font-size:10px;color:var(--tx3);margin-top:1px}
.pclose{width:26px;height:26px;border:none;background:var(--bg);border-radius:6px;cursor:pointer;font-size:13px;color:var(--tx2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pclose:hover{background:var(--bd)}
.ptabs{display:flex;border-bottom:1px solid var(--bd)}
.ptab{flex:1;padding:8px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;transition:all .15s}
.ptab.on{color:var(--tx);border-bottom-color:var(--ac)}
.pb{flex:1;overflow-y:auto;padding:10px}
.pb::-webkit-scrollbar{width:3px}
.pb::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.slabel{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:7px}
.lcard{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:all .12s}
.lcard:hover{border-color:var(--ac);background:var(--bg)}
.lcard .lcb{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.lcard .lcn{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl{padding:2px 0}
.tr{display:flex;align-items:flex-start;gap:8px;padding:4px 0}
.tc{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;padding-top:3px}
.td{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:2px solid var(--bg2);box-shadow:0 0 0 1.5px currentColor}
.td.big{width:11px;height:11px}
.tseg{width:2px;flex:1;min-height:16px;margin-top:2px}
.tx .tn{font-size:11px;font-weight:500;cursor:pointer;color:var(--tx)}
.tx .tn:hover{color:var(--ac);text-decoration:underline}
.tx .ti{font-size:9px;color:var(--tx3)}
.ttag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;flex-shrink:0;margin-top:2px}
.buscard{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg);border:1px solid var(--bd);border-radius:9px;margin-bottom:6px;cursor:pointer;border-left:3px solid #22c55e}
.buscard:hover{border-color:#22c55e}
.bplate{font-size:12px;font-weight:700}
.bsub{font-size:10px;color:var(--tx3);margin-top:2px}
.empty{text-align:center;padding:24px 12px;color:var(--tx3)}
.empty-i{font-size:24px;margin-bottom:6px}
.leaflet-tooltip{padding:3px 9px;font-size:11px;font-weight:500;border-radius:7px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx)}
</style>
</head>
<body>
<header>
  <span class="hlogo">🚌</span>
  <span class="htitle">Erzurum Otobüs</span>
  <span class="hsub" style="margin-left:4px">Canlı Takip</span>
  <div class="hlive" style="margin-left:auto">
    <div class="ldot" id="ldot"></div>
    <span id="livestatus">Bağlanıyor...</span>
  </div>
  <button class="hbtn" id="darkbtn" onclick="toggleDark()" title="Koyu mod">🌙</button>
</header>

<div class="main">
  <div id="sb">
    <div class="sbtop">
      <div class="sw">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="srch" placeholder="Hat ara (G1, Kayakyolu...)"/>
      </div>
      <div class="pills" id="pills"></div>
    </div>
    <div class="ll" id="ll"></div>
    <div class="sbar">
      <span>🚌 <b>59</b> hat</span>
      <span>📍 <b>746</b> durak</span>
      <span id="buscount" style="margin-left:auto;color:#22c55e;display:none">🚍 <b id="bcc">0</b> aktif</span>
    </div>
  </div>
  <div id="map"></div>
  <div id="panel">
    <div class="ph" id="ph"></div>
    <div class="ptabs" id="ptabs" style="display:none"></div>
    <div class="pb" id="pb"></div>
  </div>
</div>

function haversine(a,b,c,d){
  const R=6371000,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function calcSpeed(id,lat,lng){
  const prev=busHistory[id]; const now=Date.now(); let spd=busSpeedCache[id]||0;
  if(prev){const dist=haversine(prev.lat,prev.lng,lat,lng);const dt=(now-prev.t)/1000;
    if(dt>2&&dt<60){spd=Math.min(Math.round(dist/dt*3.6),90);busSpeedCache[id]=spd;}}
  busHistory[id]={lat,lng,t:now}; return spd;
}

function capColor(hex){
  if(!hex||hex==='null') return{bg:'#f1f5f9',tx:'#64748b',label:'?',dot:'#94a3b8'};
  const h=hex.replace('#','');
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  if(isNaN(r)) return{bg:'#f1f5f9',tx:'#64748b',label:'?',dot:'#94a3b8'};
  if(g>r&&g>b&&g>150) return{bg:'#dcfce7',tx:'#16a34a',label:'Müsait',dot:'#22c55e'};
  if(r>g&&r>b&&r>150) return{bg:'#fee2e2',tx:'#dc2626',label:'Dolu',dot:'#ef4444'};
  if(r>150&&g>150&&b<100) return{bg:'#fef9c3',tx:'#ca8a04',label:'Orta',dot:'#eab308'};
  return{bg:'#fef9c3',tx:'#ca8a04',label:'Orta',dot:'#eab308'};
}

function dirLabel(deg){return['K','KD','D','GD','G','GB','B','KB'][Math.round(deg/45)%8];}

function stopIcon(hi,color){
  const sz=hi?13:8;
  return L.divIcon({className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],
    html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${hi?color:'#3b82f6'};border:2px solid var(--bg2,white);box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`});
}

function drawStops(hiSet,color){
  stopLayer.clearLayers();
  GTFS.stops.forEach(s=>{
    if(isNaN(s.lat)||isNaN(s.lng)) return;
    const hi=hiSet?hiSet.has(s.id):false;
    if(hiSet&&!hi) return;
    L.marker([s.lat,s.lng],{icon:stopIcon(hi,color||'#3b82f6'),title:s.name,zIndexOffset:hi?100:0})
      .bindTooltip(s.name,{direction:'top',offset:[0,-5]})
      .on('click',e=>{L.DomEvent.stopPropagation(e);showStop(s.id);})
      .addTo(stopLayer);
  });
}

// ── Canlı otobüs ─────────────────────────────────────────────
let activeRoute=null, liveTimer=null, curTab='stops', serverOk=false;

let consecutiveErrors = 0;
const MAX_ERRORS = 5; // 5 hata üst üste → canlı takibi durdur

async function fetchBuses(routeCode, direction='0'){
  if(activeRoute !== routeCode) return;
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 9000);

    const resp = await fetch(
      `${API_BASE}/api/buses?route=${encodeURIComponent(routeCode)}&direction=${direction}`,
      { signal: controller.signal }
    );
    clearTimeout(timeout);

    // 429 → rate limit, daha uzun bekle
    if(resp.status === 429) {
      setLiveStatus(false, 'Çok fazla istek');
      liveTimer = setTimeout(() => fetchBuses(routeCode, direction), 60000);
      return;
    }

    // 503 → sunucu sorunu
    if(resp.status === 503) {
      setLiveStatus(false, 'Servis bakımda');
      liveTimer = setTimeout(() => fetchBuses(routeCode, direction), 30000);
      return;
    }

    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();

    // Token süresi dolmuş
    if(data.tokenExpired) {
      setLiveStatus(false, 'Token yenileniyor...');
      liveTimer = setTimeout(() => fetchBuses(routeCode, direction), 60000);
      return;
    }

    consecutiveErrors = 0;
    updateBusMarkers(data.buses || [], RMAP[activeRoute], data.stopNames || {});
    setLiveStatus(true);
    liveTimer = setTimeout(() => fetchBuses(routeCode, direction), 15000);

  } catch(e) {
    consecutiveErrors++;
    if(consecutiveErrors >= MAX_ERRORS) {
      setLiveStatus(false, 'Bağlantı kesildi');
      // 5 dakika sonra tekrar dene
      liveTimer = setTimeout(() => {
        consecutiveErrors = 0;
        fetchBuses(routeCode, direction);
      }, 300000);
      return;
    }
    setLiveStatus(false);
    // Her hatada biraz daha uzun bekle (exponential backoff)
    const wait = Math.min(30000 * consecutiveErrors, 120000);
    liveTimer = setTimeout(() => fetchBuses(routeCode, direction), wait);
  }
}

function setLiveStatus(ok, msg=''){
  serverOk=ok;
  document.getElementById('ldot').classList.toggle('on',ok);
  document.getElementById('livestatus').textContent = ok ? 'Canlı: Açık' : (msg || 'Bağlantı yok');
}

function updateBusMarkers(busList,route,stopNames){
  const cur=new Set(busList.map(b=>b.busId));
  Object.keys(busMarkers).forEach(id=>{if(!cur.has(id)){busMarkers[id].remove();delete busMarkers[id];}});

  busList.forEach(bus=>{
    try{
    const lat=parseFloat(bus.lat),lng=parseFloat(bus.lng);
    if(isNaN(lat)||isNaN(lng)) return;
    const bearing=parseFloat(bus.bearing)||0;
    calcSpeed(bus.busId,lat,lng);
    const moving=(busSpeedCache[bus.busId]||0)>3;
    const isReturn=bus.tripId&&bus.tripId.includes('-1');
    const busColor=isReturn?'#3b82f6':'#ef4444';

    const icon=L.divIcon({className:'',iconSize:[38,38],iconAnchor:[19,19],
      html:`<svg width="38" height="38" viewBox="0 0 38 38">
        <g transform="rotate(${bearing},19,19)">
          <polygon points="19,2 24,13 19,11 14,13" fill="${busColor}" opacity="${moving?'1':'.4'}"/>
        </g>
        <circle cx="19" cy="19" r="13" fill="${busColor}" stroke="white" stroke-width="2.5"/>
        <text x="19" y="24" text-anchor="middle" font-size="13" font-family="Arial">🚌</text>
      </svg>`});

    const cap=capColor(bus.busCapacityColor);
    const tip=`${bus.plateNumber} · ${cap.label}`;

    if(busMarkers[bus.busId]){
      busMarkers[bus.busId].setLatLng([lat,lng]).setIcon(icon).setTooltipContent(tip);
    } else {
      busMarkers[bus.busId]=L.marker([lat,lng],{icon,zIndexOffset:500})
        .bindTooltip(tip,{direction:'top',offset:[0,-10]}).addTo(busLayer);
    }
    } catch(e){ console.warn('Otobüs marker hatası:', e); }
  });

  const n=busList.length;
  document.getElementById('buscount').style.display=n?'':'none';
  if(n) document.getElementById('bcc').textContent=n;

  if(curTab==='buses'&&document.getElementById('panel').classList.contains('open')){
    renderBusList(busList,RMAP[activeRoute],stopNames);
  }
}

// ── Dark mode ────────────────────────────────────────────────
let dark=localStorage.getItem('dark')==='1';
function applyDark(d){
  document.documentElement.setAttribute('data-theme',d?'dark':'');
  document.getElementById('darkbtn').textContent=d?'☀️':'🌙';
  map.eachLayer(l=>{if(l._url) map.removeLayer(l);});
  tileLayer=L.tileLayer(d
    ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    :'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap'+(d?' © CARTO':''),maxZoom:19}).addTo(map);
}
function toggleDark(){dark=!dark;localStorage.setItem('dark',dark?'1':'0');applyDark(dark);}
if(dark) applyDark(true);

// ── Sidebar ──────────────────────────────────────────────────
const GROUPS=[{p:'A',c:'#9ef4ff'},{p:'B',c:'#9696c0'},{p:'G',c:'#5ccbf0'},
  {p:'D',c:'#ffa200'},{p:'K',c:'#888888'},{p:'M',c:'#5d5d5d'},{p:'T',c:'#e74c3c'}];
let filterG=null,srch='';

const pillsEl=document.getElementById('pills');
pillsEl.innerHTML='<span class="pill" data-g="" style="background:#334155;color:#fff">Tümü</span>'
  +GROUPS.map(g=>`<span class="pill" data-g="${g.p}" style="background:${g.c}22;color:${g.c};border-color:${g.c}55">${g.p}</span>`).join('');
pillsEl.querySelectorAll('.pill').forEach(p=>{
  p.onclick=()=>{
    filterG=p.dataset.g||null;
    pillsEl.querySelectorAll('.pill').forEach(x=>{
      const g=GROUPS.find(g=>g.p===x.dataset.g);
      const active=x===p;
      x.style.background=x.dataset.g?(active?g.c:g.c+'22'):(active?'#334155':'');
      x.style.color=x.dataset.g?(active?'#fff':g.c):(active?'#fff':'#64748b');
    });
    renderList();
  };
});

document.getElementById('srch').oninput=e=>{srch=e.target.value.toLowerCase();renderList();};

function renderList(){
  const el=document.getElementById('ll');
  const f=GTFS.routes.filter(r=>{
    if(filterG&&!r.code.startsWith(filterG)) return false;
    if(srch&&!r.code.toLowerCase().includes(srch)&&!r.name.toLowerCase().includes(srch)) return false;
    return true;
  });
  if(!f.length){el.innerHTML='<div class="empty"><div class="empty-i">🔍</div>Sonuç yok</div>';return;}
  el.innerHTML=f.map(r=>`
    <div class="li${r.id===activeRoute?' on':''}" data-id="${r.id}">
      <div class="lb" style="background:${r.color};color:${r.textColor}">${r.code}</div>
      <div class="linfo">
        <div class="ln" title="${r.name}">${r.name}</div>
        <div class="la">${r.agency==='2'?'Belediye':'Özel Halk'}</div>
      </div>
    </div>`).join('');
  el.querySelectorAll('.li').forEach(el=>el.onclick=()=>showLine(el.dataset.id));
}
renderList();

// ── Panel ────────────────────────────────────────────────────
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  activeRoute=null; clearTimeout(liveTimer);
  busLayer.clearLayers(); Object.keys(busMarkers).forEach(id=>delete busMarkers[id]);
  shapeLayer.clearLayers(); drawStops(null,null);
  document.getElementById('buscount').style.display='none';
  renderList();
}

function showStop(stopId){
  const s=SMAP[stopId]; if(!s) return;
  activeRoute=null; clearTimeout(liveTimer);
  document.getElementById('panel').classList.add('open');
  document.getElementById('ptabs').style.display='none';
  renderList();

  const rids=GTFS.stopRoutes[stopId]||[];
  const lines=rids.map(id=>RMAP[id]).filter(Boolean);
  document.getElementById('ph').innerHTML=`
    <div class="pi">📍</div>
    <div style="flex:1"><div class="ptitle">${s.name}</div><div class="psub">Durak #${s.id}</div></div>
    <button class="pclose" onclick="closePanel()">✕</button>`;

  document.getElementById('pb').innerHTML=!lines.length
    ?'<div class="empty"><div class="empty-i">🚌</div>Hat bilgisi yok</div>'
    :`<div class="slabel">Geçen Hatlar (${lines.length})</div>`
      +lines.map(r=>`<div class="lcard" data-id="${r.id}">
        <div class="lcb" style="background:${r.color};color:${r.textColor}">${r.code}</div>
        <div class="lcn">${r.name}</div><span style="color:var(--tx3)">›</span></div>`).join('');
  document.getElementById('pb').querySelectorAll('.lcard').forEach(el=>el.onclick=()=>showLine(el.dataset.id));
  map.panTo([s.lat,s.lng],{animate:true});
}

function showLine(routeId){
  const r=RMAP[routeId]; if(!r) return;
  activeRoute=routeId; clearTimeout(liveTimer);
  document.getElementById('panel').classList.add('open');
  renderList();

  document.getElementById('ph').innerHTML=`
    <div class="pi" style="background:${r.color}22;font-size:10px;font-weight:800;color:${r.color}">${r.code}</div>
    <div style="flex:1"><div class="ptitle">${r.name}</div><div class="psub">${r.agency==='2'?'Erzurum Belediye':'Özel Halk'}</div></div>
    <button class="pclose" onclick="closePanel()">✕</button>`;

  document.getElementById('ptabs').style.display='flex';
  document.getElementById('ptabs').innerHTML=`
    <div class="ptab${curTab==='stops'?' on':''}" onclick="switchTab('stops',this)">Duraklar (${r.stops0.length})</div>
    <div class="ptab${curTab==='buses'?' on':''}" onclick="switchTab('buses',this)">🚌 Canlı</div>`;

  shapeLayer.clearLayers();
  if(r.shape&&r.shape.length>1){
    L.polyline(r.shape,{color:r.color,weight:4,opacity:.85}).addTo(shapeLayer);
    map.fitBounds(L.latLngBounds(r.shape),{padding:[40,40],maxZoom:15});
  }
  drawStops(new Set([...r.stops0,...r.stops1]),r.color);
  fetchBuses(r.code,'0');
  if(curTab==='stops') renderStopList(r,r.stops0);
  else renderBusList([],r,{});
}

window.switchTab=function(tab,el){
  curTab=tab;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const r=RMAP[activeRoute]; if(!r) return;
  if(tab==='stops') renderStopList(r,r.stops0);
  else renderBusList([],r,{});
};

function renderStopList(r,stopIds){
  if(!stopIds||!stopIds.length){
    document.getElementById('pb').innerHTML='<div class="empty"><div class="empty-i">📍</div>Durak yok</div>';return;
  }
  document.getElementById('pb').innerHTML=`<div class="slabel">Duraklar (${stopIds.length})</div><div class="tl">`
    +stopIds.map((sid,i)=>{
      const s=SMAP[sid],isF=i===0,isL=i===stopIds.length-1;
      return`<div class="tr">
        <div class="tc">
          <div class="td${isF||isL?' big':''}" style="color:${r.color};background:${r.color}"></div>
          ${!isL?`<div class="tseg" style="background:${r.color}44"></div>`:''}
        </div>
        <div class="tx" style="flex:1;min-width:0">
          <div class="tn" data-sid="${sid}">${s?s.name:'#'+sid}</div>
          <div class="ti">#${sid}</div>
        </div>
        ${isF?`<span class="ttag" style="background:${r.color}22;color:${r.color}">Kalkış</span>`
         :isL?`<span class="ttag" style="background:${r.color}22;color:${r.color}">Son</span>`:''}
      </div>`;
    }).join('')+'</div>';
  document.getElementById('pb').querySelectorAll('.tn[data-sid]').forEach(el=>{
    el.onclick=()=>{const s=SMAP[el.dataset.sid];if(s) map.panTo([s.lat,s.lng],{animate:true});};
  });
}

function renderBusList(busList,route,stopNames){
  if(!busList.length){
    document.getElementById('pb').innerHTML=`<div class="empty">
      <div class="empty-i">${serverOk?'🚌':'📡'}</div>
      <div style="font-size:12px">${serverOk?'Şu an aktif otobüs yok':'Sunucuya bağlanılıyor...'}</div>
    </div>`;return;
  }
  document.getElementById('pb').innerHTML=`<div class="slabel">Aktif Otobüsler (${busList.length})</div>`
    +busList.map(bus=>{
      const cap=capColor(bus.busCapacityColor);
      const stop=stopNames[bus.stopId]||'';
      const isReturn=bus.tripId&&bus.tripId.includes('-1');
      const busColor=isReturn?'#3b82f6':'#ef4444';
      const dir=bus.bearing?dirLabel(parseFloat(bus.bearing)):'';
      return`<div class="buscard" onclick="map.panTo([${bus.lat},${bus.lng}],{animate:true})" style="border-left-color:${busColor}">
        <div style="width:36px;height:36px;border-radius:9px;background:${busColor}22;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🚌</div>
        <div style="flex:1;min-width:0">
          <div class="bplate">${bus.plateNumber}</div>
          <div class="bsub" style="display:flex;gap:6px;flex-wrap:wrap">
            ${dir?`<span>${dir}</span>`:''}
            ${stop?`<span>📍 ${stop}</span>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
          <div style="width:8px;height:8px;border-radius:50%;background:${cap.dot}"></div>
          <span style="font-size:11px;font-weight:600;color:${cap.tx}">${cap.label}</span>
        </div>
      </div>`;
    }).join('');
}
</script>
</body>
</html>
